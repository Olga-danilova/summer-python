<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🐍 Летний Python-марафон</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#f0f4ff;--bg2:#ffffff;--bg3:#e8edf9;--border:#dde3f2;--text:#1a1f36;--muted:#6b748f;--shadow:0 2px 12px rgba(99,102,241,0.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;animation:fadeIn .3s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(250,204,21,.4)}50%{box-shadow:0 0 40px rgba(250,204,21,.8)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
.shake{animation:shake .4s ease}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;transition:all .25s ease;box-shadow:var(--shadow)}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(99,102,241,0.14)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;transition:all .2s ease}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-primary:hover:not(:disabled){background:linear-gradient(135deg,#4f46e5,#7c3aed);transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--bg2);border-color:rgba(99,102,241,.3)}
.btn-run{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:15px;padding:12px 28px}
.btn-run:hover:not(:disabled){background:linear-gradient(135deg,#16a34a,#15803d);transform:translateY(-1px)}
.btn-check{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:15px;padding:12px 28px}
.btn-check:hover:not(:disabled){transform:translateY(-1px)}
.hud{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.hud-title{font-size:18px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.level-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:600;white-space:nowrap}
.xp-bar-wrap{flex:1;min-width:80px;max-width:200px}
.xp-bar-bg{background:var(--bg3);border-radius:99px;height:8px;overflow:hidden}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#a78bfa);transition:width .5s ease}
.xp-label{font-size:11px;color:var(--muted);margin-top:2px}
.medals-count{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600}
.topic-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);border-top-width:3px;padding:20px;cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;box-shadow:var(--shadow)}
.topic-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at top left,var(--glow-color,transparent) 0%,transparent 60%);opacity:0;transition:opacity .3s}
.topic-card:hover{transform:translateY(-4px)}
.topic-card:hover::before{opacity:.08}
.topic-card.completed{border-color:rgba(34,197,94,.5)!important}
.topic-card.completed:hover{box-shadow:0 8px 32px rgba(34,197,94,.2)!important}
.stars{color:#c4c9dd;font-size:15px;letter-spacing:1px}
.stars .filled{color:#f59e0b}
.tab-btn{padding:10px 20px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--bg3);color:var(--text);box-shadow:0 0 0 1px var(--border)}
.tab-btn:hover:not(.active){color:var(--text)}
.theory-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;animation:slideUp .3s ease;box-shadow:var(--shadow)}
.code-block{background:#f4f6fd;border:1px solid #dde3f2;border-radius:8px;padding:16px;font-family:'Fira Code',monospace;font-size:13px;line-height:1.7;overflow-x:auto;margin:10px 0;position:relative;color:#1a1f36}
.code-output{background:#eef1fa;border-top:1px solid #dde3f2;padding:10px 16px;font-family:'Fira Code',monospace;font-size:12px;color:#475569;margin-top:0;border-radius:0 0 8px 8px}
.quiz-option{width:100%;text-align:left;padding:14px 18px;border-radius:10px;border:2px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;transition:all .2s;margin-bottom:8px;display:block;box-shadow:0 1px 4px rgba(99,102,241,0.06)}
.quiz-option:hover:not(:disabled){border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.06)}
.quiz-option.correct{border-color:#16a34a!important;background:rgba(34,197,94,.1)!important;color:#15803d}
.quiz-option.wrong{border-color:#dc2626!important;background:rgba(239,68,68,.08)!important;color:#dc2626}
.quiz-option:disabled{cursor:not-allowed;opacity:.7}
.output-area{background:#f8faff;border:1px solid var(--border);border-radius:10px;padding:14px;font-family:'Fira Code',monospace;font-size:13px;min-height:60px;white-space:pre-wrap;word-break:break-all;color:#334155;margin-top:12px}
.output-area.success{border-color:rgba(22,163,74,.4);background:#f0fdf4;color:#15803d}
.output-area.error{border-color:rgba(220,38,38,.3);background:#fff5f5;color:#dc2626}
.overlay{position:fixed;inset:0;background:rgba(30,35,60,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.medal-box{background:linear-gradient(135deg,#fff9e6,#fffbf0);border:2px solid rgba(250,204,21,.5);border-radius:24px;padding:48px 40px;text-align:center;max-width:380px;width:90%;animation:popIn .5s ease;box-shadow:0 20px 60px rgba(250,204,21,.2)}
.medal-icon{font-size:80px;animation:glow 2s ease infinite;display:inline-block}
.xp-float{position:fixed;font-size:18px;font-weight:800;color:#a78bfa;pointer-events:none;z-index:9999;animation:xpFloat .8s ease forwards}
.pyodide-status{position:fixed;bottom:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;color:var(--muted);z-index:200;display:flex;align-items:center;gap:6px;transition:all .3s}
.spinner{width:12px;height:12px;border:2px solid rgba(99,102,241,.3);border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
.CodeMirror{height:auto;min-height:140px;font-family:'Fira Code',monospace;font-size:13px;border-radius:10px;border:1px solid rgba(99,102,241,.3)}
.CodeMirror-scroll{min-height:140px}
/* Syntax colors in theory */
.kw{color:#7c00d4}.fn{color:#0070c1}.st{color:#a31515}.cm{color:#6a9955;font-style:italic}.nu{color:#098658}.op{color:#7c00d4}.bi{color:#267f99}
.topic-header-accent{height:4px;border-radius:4px;margin-bottom:20px}
.progress-ring{width:36px;height:36px}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;transition:color .2s}
.back-btn:hover{color:var(--text)}
.task-result-ok{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.3);border-radius:10px;padding:14px;color:#15803d;font-size:14px;font-weight:600;margin-top:12px}
.task-result-err{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.25);border-radius:10px;padding:14px;color:#dc2626;font-size:14px;margin-top:12px}
.task-passed-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;color:#15803d}
pre{margin:0}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,.35)}
/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff 0%,#e8edf9 100%)}
.login-box{background:#fff;border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(99,102,241,.12)}
.login-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s;background:#fff}
.login-input:focus{border-color:#6366f1}
.login-error{color:#dc2626;font-size:13px;margin-top:8px;display:none}
/* Quiz explain */
.quiz-explain{background:#f0f9ff;border:1px solid #bae6fd;border-radius:10px;padding:12px 16px;font-size:13px;color:#0369a1;margin-top:8px;line-height:1.5}
.quiz-explain.correct-ex{background:#f0fdf4;border-color:#86efac;color:#15803d}
/* Retake btn */
.btn-retake{background:var(--bg3);color:var(--muted);border:1px solid var(--border);font-size:13px;padding:8px 16px}
.btn-retake:hover{background:var(--bg2);color:var(--text);border-color:rgba(99,102,241,.3)}
/* Admin */
.admin-stat-card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;box-shadow:var(--shadow)}
.admin-stat-val{font-size:28px;font-weight:800;color:#6366f1}
.admin-stat-label{font-size:12px;color:var(--muted);margin-top:4px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:10px 12px;background:var(--bg3);font-weight:700;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border)}
.admin-table tr:last-child td{border-bottom:none}
.admin-table tr:hover td{background:var(--bg)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="loginScreen">
  <div class="login-wrap">
    <div class="login-box">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:52px;margin-bottom:12px">🐍</div>
        <h1 style="font-size:24px;font-weight:800;color:var(--text)">Летний Python-марафон</h1>
        <p style="color:var(--muted);font-size:14px;margin-top:6px">Введите логин и пароль</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <input class="login-input" id="loginInput" type="text" placeholder="Логин" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('passInput').focus()"/>
        <input class="login-input" id="passInput" type="password" placeholder="Пароль" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')tryLogin()"/>
        <div class="login-error" id="loginError">Неверный логин или пароль</div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:14px;margin-top:4px" onclick="tryLogin()">Войти →</button>
      </div>
    </div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div class="screen" id="adminScreen">
  <div class="hud">
    <div class="hud-title">🔐 Панель учителя</div>
    <div style="margin-left:auto">
      <button class="btn btn-secondary" onclick="logout()">Выйти</button>
    </div>
  </div>
  <div style="max-width:960px;margin:0 auto;padding:32px 20px" id="adminContent"></div>
</div>

<!-- Pyodide status indicator -->
<div class="pyodide-status" id="pyStatus">
  <div class="spinner" id="pySpinner"></div>
  <span id="pyStatusText">Python загружается...</span>
</div>

<!-- Medal overlay -->
<div class="overlay" id="medalOverlay" style="display:none">
  <div class="medal-box">
    <div class="medal-icon">🏅</div>
    <h2 style="font-size:26px;font-weight:800;margin:20px 0 8px">Медаль получена!</h2>
    <p style="color:#6b748f;font-size:16px;margin-bottom:12px">Тема завершена!</p>
    <div style="background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.25);border-radius:12px;padding:16px;margin:20px 0;font-size:22px;font-weight:800;color:#4f46e5" id="medalXP"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:14px" onclick="closeMedal()">Продолжить 🚀</button>
  </div>
</div>

<!-- SCREEN: HOME -->
<div class="screen" id="homeScreen">
  <div class="hud">
    <div class="hud-title">🐍 Летний Python-марафон</div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="level-badge" id="hudLevel">🐣 Новичок</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="hudXpBar" style="width:0%"></div></div>
        <div class="xp-label" id="hudXpLabel">0 XP</div>
      </div>
      <div class="medals-count">🏅 <span id="hudMedals">0</span>/12</div>
      <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="logout()">Выйти</button>
    </div>
  </div>

  <div style="max-width:960px;margin:0 auto;padding:32px 20px">
    <div style="text-align:center;margin-bottom:40px;padding:32px 20px;background:linear-gradient(135deg,#f0f4ff,#fff);border-radius:20px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(99,102,241,0.1)">
      <div style="font-size:48px;margin-bottom:12px">🐍</div>
      <h1 style="font-size:36px;font-weight:800;background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px">Саша, добрый день!</h1>

      <div style="display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap">
        <div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#a78bfa" id="statXP">0</div><div style="font-size:12px;color:var(--muted)">XP заработано</div></div>
        <div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#60a5fa" id="statTopics">0</div><div style="font-size:12px;color:var(--muted)">Тем пройдено</div></div>
        <div style="text-align:center"><div style="font-size:28px;font-weight:800;color:#34d399" id="statMedals">0</div><div style="font-size:12px;color:var(--muted)">Медалей</div></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px" id="topicGrid"></div>
  </div>
</div>

<!-- SCREEN: TOPIC -->
<div class="screen" id="topicScreen">
  <div class="hud">
    <button class="back-btn" onclick="goHome()">← Назад</button>
    <div style="margin-left:16px;font-weight:700;font-size:16px" id="topicHudTitle"></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <div class="level-badge" id="topicHudLevel">🐣 Новичок</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="topicHudXpBar" style="width:0%"></div></div>
        <div class="xp-label" id="topicHudXpLabel">0 XP</div>
      </div>
      <div class="medals-count">🏅 <span id="topicHudMedals">0</span>/12</div>
    </div>
  </div>

  <div style="max-width:860px;margin:0 auto;padding:28px 20px">
    <div style="margin-bottom:24px" id="topicHeader"></div>
    <div style="display:flex;gap:8px;margin-bottom:24px;background:var(--bg2);border-radius:14px;padding:6px;border:1px solid var(--border)">
      <button class="tab-btn active" id="tabTheory" onclick="switchTab('theory')">📖 Теория</button>
      <button class="tab-btn" id="tabQuiz" onclick="switchTab('quiz')">❓ Тест</button>
      <button class="tab-btn" id="tabTasks" onclick="switchTab('tasks')">💻 Задачи</button>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/pyodide@0.25.1/pyodide.js"></script>
<script>
// ============================
// AUTH & SESSION
// ============================
const STUDENT_LOGIN = 'sasha';
const STUDENT_PASS  = 'python2026';
const ADMIN_LOGIN   = 'teacher';
const ADMIN_PASS    = 'repet2026';

let currentRole = null;
let _sessionStart = null;

function tryLogin(){
  const login = document.getElementById('loginInput').value.trim().toLowerCase();
  const pass  = document.getElementById('passInput').value;
  const err   = document.getElementById('loginError');
  err.style.display = 'none';
  if(login === STUDENT_LOGIN && pass === STUDENT_PASS){
    currentRole = 'student';
    _sessionStart = Date.now();
    _markDayActive();
    showScreen('homeScreen');
    renderTopicGrid();
    updateHUD();
  } else if(login === ADMIN_LOGIN && pass === ADMIN_PASS){
    currentRole = 'admin';
    showScreen('adminScreen');
    renderAdmin();
  } else {
    err.style.display = 'block';
    document.getElementById('passInput').value = '';
  }
}

function logout(){
  _saveSession();
  currentRole = null;
  _sessionStart = null;
  document.getElementById('loginInput').value = '';
  document.getElementById('passInput').value = '';
  showScreen('loginScreen');
}

function _markDayActive(){
  const p = getProgress();
  const today = new Date().toISOString().slice(0,10);
  if(!p.activeDays) p.activeDays = [];
  if(!p.activeDays.includes(today)) p.activeDays.push(today);
  saveProgress(p);
}

function _saveSession(){
  if(!_sessionStart) return;
  const dur = Date.now() - _sessionStart;
  const p = getProgress();
  if(!p.totalMs) p.totalMs = 0;
  p.totalMs += dur;
  if(!p.sessions) p.sessions = [];
  p.sessions.push({ date: new Date().toISOString().slice(0,10), dur });
  saveProgress(p);
  _sessionStart = null;
}

// Auto-save on page close / tab hide
window.addEventListener('beforeunload', _saveSession);
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden && currentRole === 'student') _saveSession();
  else if(!document.hidden && currentRole === 'student') {
    _sessionStart = Date.now();
    _markDayActive();
  }
});

// ============================
// ADMIN DASHBOARD
// ============================
function renderAdmin(){
  const p = getProgress();
  const totalMs = p.totalMs || 0;
  const days = (p.activeDays || []).length;
  const sessions = (p.sessions || []);
  const medals = countMedals();

  function fmtTime(ms){
    const h = Math.floor(ms/3600000);
    const m = Math.floor((ms%3600000)/60000);
    if(h > 0) return h+'ч '+m+'м';
    return m+'м';
  }

  let totalQuizQ = 0, totalQuizOk = 0, totalTasks = 0, totalTasksOk = 0;
  TOPICS.forEach(t=>{
    totalQuizQ += t.quiz.length;
    totalQuizOk += countQuizCorrect(t.id);
    totalTasks += t.tasks.length;
    totalTasksOk += countTasksPassed(t.id);
  });

  const lvl = getLevelInfo(p.xp || 0);

  // Last 5 sessions
  const recentSessions = [...sessions].reverse().slice(0,5);

  const el = document.getElementById('adminContent');
  el.innerHTML = `
    <h2 style="font-size:22px;font-weight:800;margin-bottom:24px">Прогресс Саши</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:32px">
      <div class="admin-stat-card"><div class="admin-stat-val">${p.xp||0}</div><div class="admin-stat-label">XP заработано</div></div>
      <div class="admin-stat-card"><div class="admin-stat-val">${lvl.label.split(' ').slice(1).join(' ')}</div><div class="admin-stat-label">Уровень</div></div>
      <div class="admin-stat-card"><div class="admin-stat-val">${medals}</div><div class="admin-stat-label">Медалей / 12</div></div>
      <div class="admin-stat-card"><div class="admin-stat-val">${days}</div><div class="admin-stat-label">Дней занятий</div></div>
      <div class="admin-stat-card"><div class="admin-stat-val">${fmtTime(totalMs)}</div><div class="admin-stat-label">Всего времени</div></div>

{id:'lists',num:5,emoji:'📋',title:'Списки',subtitle:'Массивы, срезы, методы',hue:140,
theory:[
{title:'Создание и индексы',body:`<p style="margin-bottom:10px">Список — упорядоченная коллекция. Индексы начинаются с 0. Отрицательные идут с конца.</p>`,code:`lst = [<span class="nu">10</span>, <span class="nu">20</span>, <span class="nu">30</span>, <span class="nu">40</span>]\n<span class="fn">print</span>(lst[<span class="nu">0</span>])    <span class="cm"># 10</span>\n<span class="fn">print</span>(lst[-<span class="nu">1</span>])   <span class="cm"># 40</span>\n<span class="fn">print</span>(<span class="fn">len</span>(lst))  <span class="cm"># 4</span>`,output:`10\n40\n4`},
{title:'Методы списка',body:`<p style="margin-bottom:10px">Вот самые нужные методы:</p>`,code:`lst = [<span class="nu">3</span>, <span class="nu">1</span>, <span class="nu">4</span>, <span class="nu">1</span>, <span class="nu">5</span>]\nlst.append(<span class="nu">9</span>)    <span class="cm"># [3,1,4,1,5,9]</span>\nlst.remove(<span class="nu">1</span>)    <span class="cm"># [3,4,1,5,9]</span>\nlst.sort()        <span class="cm"># [1,3,4,5,9]</span>\nlst.reverse()     <span class="cm"># [9,5,4,3,1]</span>\n<span class="fn">print</span>(lst)`,output:`[9, 5, 4, 3, 1]`},
{title:'Срезы',body:`<p style="margin-bottom:10px">Срез <span class="bi">[start:stop:step]</span> возвращает часть списка.</p>`,code:`lst = [<span class="nu">0</span>, <span class="nu">1</span>, <span class="nu">2</span>, <span class="nu">3</span>, <span class="nu">4</span>, <span class="nu">5</span>]\n<span class="fn">print</span>(lst[<span class="nu">1</span>:<span class="nu">4</span>])   <span class="cm"># [1, 2, 3]</span>\n<span class="fn">print</span>(lst[::<span class="nu">2</span>])   <span class="cm"># [0, 2, 4]</span>\n<span class="fn">print</span>(lst[::-<span class="nu">1</span>])  <span class="cm"># [5, 4, 3, 2, 1, 0]</span>`,output:`[1, 2, 3]\n[0, 2, 4]\n[5, 4, 3, 2, 1, 0]`},
{title:'Перебор',body:`<p style="margin-bottom:10px"><span class="fn">enumerate</span>() даёт индекс и значение. List comprehension — краткий способ создать список.</p>`,code:`lst = [<span class="st">"а"</span>, <span class="st">"б"</span>, <span class="st">"в"</span>]\n<span class="kw">for</span> i, x <span class="kw">in</span> <span class="fn">enumerate</span>(lst):\n    <span class="fn">print</span>(i, x)\nsquares = [x**<span class="nu">2</span> <span class="kw">for</span> x <span class="kw">in</span> <span class="fn">range</span>(<span class="nu">5</span>)]\n<span class="fn">print</span>(squares)`,output:`0 а\n1 б\n2 в\n[0, 1, 4, 9, 16]`}
],

{id:'strings',num:6,emoji:'📝',title:'Строки',subtitle:'Методы, срезы, форматирование',hue:170,
theory:[
{title:'Основы строк',body:`<p style="margin-bottom:10px">Строки работают как последовательности символов. Можно брать срезы и перебирать в цикле.</p>`,code:`s = <span class="st">"Python"</span>\n<span class="fn">print</span>(<span class="fn">len</span>(s))     <span class="cm"># 6</span>\n<span class="fn">print</span>(s[<span class="nu">0</span>])      <span class="cm"># P</span>\n<span class="fn">print</span>(s[<span class="nu">1</span>:<span class="nu">4</span>])    <span class="cm"># yth</span>\n<span class="fn">print</span>(s[::-<span class="nu">1</span>])   <span class="cm"># nohtyP</span>`,output:`6\nP\nyth\nnohtyP`},
{title:'Методы строк',body:`<p style="margin-bottom:10px">Строки неизменяемы — каждый метод возвращает новую строку, а не меняет исходную.</p>`,code:`s = <span class="st">"  Hello, World!  "</span>\n<span class="fn">print</span>(s.upper())          <span class="cm"># HELLO, WORLD!</span>\n<span class="fn">print</span>(s.lower())          <span class="cm"># hello, world!</span>\n<span class="fn">print</span>(s.strip())          <span class="cm"># Hello, World!</span>\n<span class="fn">print</span>(s.replace(<span class="st">"o"</span>,<span class="st">"0"</span>)) <span class="cm"># Hell0, W0rld!</span>\n<span class="fn">print</span>(s.count(<span class="st">"l"</span>))       <span class="cm"># 3</span>`,output:`  HELLO, WORLD!  \n  hello, world!  \nHello, World!\n  Hell0, W0rld!  \n3`},
{title:'split и join',body:`<p style="margin-bottom:10px"><span class="fn">split</span>() делит строку на список. <span class="fn">join</span>() склеивает список в строку.</p>`,code:`s = <span class="st">"яблоко,банан,вишня"</span>\nparts = s.split(<span class="st">","</span>)\n<span class="fn">print</span>(parts)\nresult = <span class="st">" | "</span>.join(parts)\n<span class="fn">print</span>(result)`,output:`['яблоко', 'банан', 'вишня']\nяблоко | банан | вишня`},
{title:'in и форматирование',body:`<p style="margin-bottom:10px">Оператор <span class="kw">in</span> проверяет вхождение подстроки. f-строки удобнее всего для вставки переменных в строку.</p>`,code:`<span class="fn">print</span>(<span class="st">"py"</span> <span class="kw">in</span> <span class="st">"python"</span>)  <span class="cm"># True</span>\n<span class="fn">print</span>(<span class="st">"ha"</span> * <span class="nu">3</span>)            <span class="cm"># hahaha</span>\nname = <span class="st">"Саша"</span>\n<span class="fn">print</span>(<span class="st">f"Привет, {name.upper()}!"</span>)`,output:`True\nhahaha\nПривет, САША!`}
],

{id:'funcs',num:7,emoji:'🔧',title:'Функции',subtitle:'def, return, аргументы',hue:340,
theory:[
{title:'def и return',body:`<p style="margin-bottom:10px">Функция — это блок кода с именем. <span class="kw">def</span> объявляет функцию, <span class="kw">return</span> возвращает результат.</p>`,code:`<span class="kw">def</span> <span class="fn">add</span>(a, b):\n    <span class="kw">return</span> a + b\n\nresult = <span class="fn">add</span>(<span class="nu">2</span>, <span class="nu">3</span>)\n<span class="fn">print</span>(result)`,output:`5`},
{title:'Аргументы по умолчанию',body:`<p style="margin-bottom:10px">Параметры могут иметь значения по умолчанию — тогда их можно не передавать при вызове.</p>`,code:`<span class="kw">def</span> <span class="fn">greet</span>(name=<span class="st">"мир"</span>):\n    <span class="fn">print</span>(<span class="st">f"Привет, {name}!"</span>)\n\n<span class="fn">greet</span>()         <span class="cm"># Привет, мир!</span>\n<span class="fn">greet</span>(<span class="st">"Саша"</span>)  <span class="cm"># Привет, Саша!</span>`,output:`Привет, мир!\nПривет, Саша!`},
{title:'Несколько return',body:`<p style="margin-bottom:10px">Функция может завершиться раньше через ранний <span class="kw">return</span>.</p>`,code:`<span class="kw">def</span> <span class="fn">divide</span>(a, b):\n    <span class="kw">if</span> b == <span class="nu">0</span>:\n        <span class="kw">return</span> <span class="st">"нельзя делить на 0"</span>\n    <span class="kw">return</span> a / b\n\n<span class="fn">print</span>(<span class="fn">divide</span>(<span class="nu">10</span>, <span class="nu">2</span>))\n<span class="fn">print</span>(<span class="fn">divide</span>(<span class="nu">10</span>, <span class="nu">0</span>))`,output:`5.0\nнельзя делить на 0`},
{title:'Зачем функции?',body:`<p style="margin-bottom:10px">Принцип DRY — Don't Repeat Yourself. Функции делают код читаемым и позволяют писать код один раз и вызывать его много раз.</p>`,code:`<span class="cm"># Без функции — повторение!</span>\n<span class="fn">print</span>(<span class="st">"Привет, Саша! Рад тебя видеть!"</span>)\n<span class="fn">print</span>(<span class="st">"Привет, Аня! Рад тебя видеть!"</span>)\n\n<span class="cm"># С функцией — чисто!</span>\n<span class="kw">def</span> <span class="fn">welcome</span>(name):\n    <span class="fn">print</span>(<span class="st">f"Привет, {name}! Рад тебя видеть!"</span>)\n\n<span class="fn">welcome</span>(<span class="st">"Саша"</span>)\n<span class="fn">welcome</span>(<span class="st">"Аня"</span>)`,output:`Привет, Саша! Рад тебя видеть!\nПривет, Аня! Рад тебя видеть!\nПривет, Саша! Рад тебя видеть!\nПривет, Аня! Рад тебя видеть!`}
],

{id:'tryexcept',num:8,emoji:'🛡️',title:'try / except',subtitle:'Обработка ошибок',hue:45,
theory:[
{title:'try / except',body:`<p style="margin-bottom:10px">Блок <span class="kw">try</span> пробует выполнить код. Если возникает ошибка — срабатывает <span class="kw">except</span>.</p>`,code:`<span class="kw">try</span>:\n    x = <span class="kw">int</span>(<span class="st">"abc"</span>)\nexcept <span class="bi">ValueError</span>:\n    <span class="fn">print</span>(<span class="st">"Ошибка: не число!"</span>)\n\n<span class="kw">try</span>:\n    result = <span class="nu">10</span> / <span class="nu">0</span>\nexcept <span class="bi">ZeroDivisionError</span>:\n    <span class="fn">print</span>(<span class="st">"Нельзя делить на 0!"</span>)`,output:`Ошибка: не число!\nНельзя делить на 0!`},
{title:'except as e',body:`<p style="margin-bottom:10px">Можно получить текст ошибки через <span class="bi">as e</span>.</p>`,code:`<span class="kw">try</span>:\n    x = <span class="kw">int</span>(<span class="st">"hello"</span>)\nexcept <span class="bi">ValueError</span> <span class="kw">as</span> e:\n    <span class="fn">print</span>(<span class="st">f"Поймана ошибка: {e}"</span>)`,output:`Поймана ошибка: invalid literal for int() with base 10: 'hello'`},
{title:'finally',body:`<p style="margin-bottom:10px"><span class="kw">finally</span> выполняется <b>всегда</b> — есть ошибка или нет. Удобно для закрытия файлов и т.д.</p>`,code:`<span class="kw">try</span>:\n    result = <span class="nu">10</span> / <span class="nu">2</span>\n    <span class="fn">print</span>(<span class="st">f"Результат: {result}"</span>)\nexcept <span class="bi">ZeroDivisionError</span>:\n    <span class="fn">print</span>(<span class="st">"Ошибка деления!"</span>)\n<span class="kw">finally</span>:\n    <span class="fn">print</span>(<span class="st">"Конец вычислений"</span>)`,output:`Результат: 5.0\nКонец вычислений`}
],

// PROGRESS
// ============================
const STORAGE_KEY = 'sasha_summer_2026';

function getProgress(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{xp:0,topics:{}};}
  catch{return{xp:0,topics:{}};}
}
function saveProgress(p){localStorage.setItem(STORAGE_KEY,JSON.stringify(p));}
function getTopicProgress(id){const p=getProgress();return p.topics[id]||{quizAnswers:{},tasksPassed:{},taskCode:{},medal:false};}
function saveTopicProgress(id,tp){const p=getProgress();p.topics[id]=tp;saveProgress(p);}
function saveTaskCode(topicId,ti,code){const tp=getTopicProgress(topicId);if(!tp.taskCode)tp.taskCode={};tp.taskCode[ti]=code;saveTopicProgress(topicId,tp);}
function loadTaskCode(topicId,ti,fallback){const tp=getTopicProgress(topicId);return(tp.taskCode&&tp.taskCode[ti])||fallback;}
function countQuizCorrect(topicId){
  const tp=getTopicProgress(topicId);
  const t=TOPICS.find(t=>t.id===topicId);
  let c=0;
  t.quiz.forEach((q,i)=>{if(tp.quizAnswers[i]===q.ans)c++;});
  return c;
}
function countTasksPassed(topicId){
  const tp=getTopicProgress(topicId);
  return Object.values(tp.tasksPassed).filter(Boolean).length;
}
function addXP(amount, sourceEl){
  const p=getProgress();
  p.xp+=amount;
  saveProgress(p);
  updateHUD();
  if(sourceEl){
    const el=document.createElement('div');
    el.className='xp-float';
    el.textContent=`+${amount} XP`;
    const rect=sourceEl.getBoundingClientRect();
    el.style.left=rect.left+'px';
    el.style.top=rect.top+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),900);
  }
}
function getLevelInfo(xp){
  let l=LEVELS[0];
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){l=LEVELS[i];break;}}
  return l;
}
function getLevelPercent(xp){
  let idx=0;
  for(let i=LEVELS.length-1;i>=0;i--){if(xp>=LEVELS[i].xp){idx=i;break;}}
  if(idx>=LEVELS.length-1)return 100;
  const cur=LEVELS[idx].xp;
  const nxt=LEVELS[idx+1].xp;
  return Math.round(((xp-cur)/(nxt-cur))*100);
}
function countMedals(){
  const p=getProgress();
  return Object.values(p.topics).filter(t=>t.medal).length;
}
function updateHUD(){
  const p=getProgress();
  const lvl=getLevelInfo(p.xp);
  const pct=getLevelPercent(p.xp);
  const medals=countMedals();
  ['hud','topicHud'].forEach(prefix=>{
    const lv=document.getElementById(prefix+'Level');
    const xb=document.getElementById(prefix+'XpBar');
    const xl=document.getElementById(prefix+'XpLabel');
    const md=document.getElementById(prefix+'Medals');
    if(lv)lv.textContent=lvl.label;
    if(xb)xb.style.width=pct+'%';
    if(xl)xl.textContent=p.xp+' XP';
    if(md)md.textContent=medals;
  });
  const sx=document.getElementById('statXP');
  const st=document.getElementById('statTopics');
  const sm=document.getElementById('statMedals');
  if(sx)sx.textContent=p.xp;
  if(sm)sm.textContent=medals;
  if(st){
    const completed=TOPICS.filter(t=>{
      const tOk=countTasksPassed(t.id)===t.tasks.length;
      const qOk=t.type==='practice'?true:countQuizCorrect(t.id)===t.quiz.length;
      return tOk&&qOk;
    }).length;
    st.textContent=completed;
  }
}

// PYODIDE
// ============================
let _pyodideInstance=null;
let _pyodidePromise=null;
let _pyodideReady=false;

async function getPy(){
  if(_pyodideInstance)return _pyodideInstance;
  if(!_pyodidePromise){_pyodidePromise=loadPyodide({indexURL:'https://cdn.jsdelivr.net/npm/pyodide@0.25.1/'});}
  _pyodideInstance=await _pyodidePromise;
  return _pyodideInstance;
}

async function runStudentCode(code,inputs=[]){
  const py=await getPy();
  const setup=`import sys\nfrom io import StringIO\n_cap=StringIO()\nsys.stdout=_cap\n`;
  let inputSetup='';
  if(inputs.length>0){
    inputSetup=`import builtins\n_inp=iter(${JSON.stringify(inputs)})\nbuiltins.input=lambda *a:next(_inp)\n`;
  }
  try{
    py.runPython(setup+inputSetup);
    py.runPython(code);
    py.runPython('sys.stdout=sys.__stdout__\n_out=_cap.getvalue()');
    const output=py.globals.get('_out').trim();
    return{ok:true,output};
  }catch(e){
    try{py.runPython('sys.stdout=sys.__stdout__');}catch{}
    const msg=e.message||String(e);
    const lines=msg.split('\n');
    const last=lines.filter(l=>l.trim()).pop()||msg;
    return{ok:false,error:last};
  }
}

// ============================
// NAVIGATION
// ============================
let currentTopic=null;
let currentTab='theory';
let editors={};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome(){
  showScreen('homeScreen');
  renderTopicGrid();
  updateHUD();
}

function openTopic(topicId){
  currentTopic=TOPICS.find(t=>t.id===topicId);
  if(!currentTopic)return;
  editors={};
  showScreen('topicScreen');
  document.getElementById('topicHudTitle').textContent=currentTopic.emoji+' '+currentTopic.title;
  renderTopicHeader();
  // Show/hide theory+quiz tabs based on topic type
  const isPractice = currentTopic.type === 'practice';
  document.getElementById('tabTheory').style.display = isPractice ? 'none' : '';
  document.getElementById('tabQuiz').style.display = isPractice ? 'none' : '';
  if (isPractice) switchTab('tasks'); else switchTab('theory');
  updateHUD();
}

function switchTab(tab){
  currentTab=tab;
  ['theory','quiz','tasks'].forEach(t=>{
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab);
  });
  const content=document.getElementById('tabContent');
  content.innerHTML='';
  if(tab==='theory')renderTheory(content);
  else if(tab==='quiz')renderQuiz(content);
  else if(tab==='tasks')renderTasks(content);
}

// HOME
// ============================
function renderTopicGrid(){
  const grid=document.getElementById('topicGrid');
  grid.innerHTML='';
  TOPICS.forEach(t=>{
    const isPractice = t.type === 'practice';
    const qCorrect=isPractice?0:countQuizCorrect(t.id);
    const tPassed=countTasksPassed(t.id);
    const tp=getTopicProgress(t.id);
    const completed=isPractice?(tPassed===t.tasks.length):(qCorrect===t.quiz.length&&tPassed===t.tasks.length);
    const color=`hsl(${t.hue},70%,60%)`;
    const card=document.createElement('div');
    card.className='topic-card'+(completed?' completed':'');
    card.style.borderTopColor=color;
    card.style.setProperty('--glow-color',color);
    if(!completed){
      card.onmouseenter=()=>{card.style.boxShadow=`0 8px 32px hsl(${t.hue},70%,40%,0.25)`;};
      card.onmouseleave=()=>{card.style.boxShadow='';};
    }
    card.onclick=()=>openTopic(t.id);
    const stars=Array(t.tasks.length).fill(0).map((_,i)=>
      `<span class="${i<tPassed?'filled':''}">${i<tPassed?'★':'☆'}</span>`
    ).join('');
    const quizFrac=qCorrect+'/'+t.quiz.length;
    const medal=tp.medal?`<span title="Медаль получена!" style="font-size:20px">🏅</span>`:`<span style="font-size:20px;opacity:.25">🏅</span>`;
    card.innerHTML=`
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:28px;margin-bottom:4px">${t.emoji}</div>
          <div style="font-size:11px;color:hsl(${t.hue},70%,60%);font-weight:700;letter-spacing:.5px;text-transform:uppercase">Тема ${t.num}</div>
          <div style="font-size:17px;font-weight:700;margin-top:2px">${t.title}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${t.subtitle}</div>
        </div>
        ${medal}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px">
        <div>
          ${isPractice
            ? `<div style="font-size:14px;color:hsl(${t.hue},70%,60%);font-weight:600">💪 ${t.tasks.length} задач разного уровня</div><div style="font-size:12px;color:var(--muted);margin-top:4px">Решено: ${tPassed}/${t.tasks.length}</div>`
            : `<div class="stars" style="font-size:16px;letter-spacing:2px">${stars} <span style="font-size:11px;color:var(--muted)">${tPassed}/${t.tasks.length} задачи</span></div><div style="font-size:12px;color:var(--muted);margin-top:4px">Тест: ${qCorrect===t.quiz.length?'<span style="color:#4ade80">✓ '+quizFrac+'</span>':'<span>'+quizFrac+'</span>'}</div>`
          }
        </div>
        ${completed?'<span style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:#4ade80">✓ Пройдено</span>':''}
      </div>`;
    grid.appendChild(card);
  });
}

    <div style="height:3px;background:linear-gradient(90deg,${color},transparent);border-radius:3px;margin-top:16px"></div>`;
}

// ============================
// THEORY
// ============================
function renderTheory(container){
  const t=currentTopic;
  t.theory.forEach((card,i)=>{
    const div=document.createElement('div');
    div.className='theory-card';
    div.style.animationDelay=(i*0.07)+'s';
    div.style.marginBottom='16px';
    div.innerHTML=`
      <h3 style="font-size:17px;font-weight:700;margin-bottom:12px;color:hsl(${t.hue},70%,65%)">${card.title}</h3>
      ${card.body}
      <div class="code-block"><pre>${card.code}</pre></div>
      ${card.output?`<div class="code-output"><span style="color:var(--muted);font-size:11px">Вывод:</span>\n${escHtml(card.output)}</div>`:''}`;
    container.appendChild(div);
  });
}

// ============================
// QUIZ
// ============================
function resetQuiz(topicId){
  const tp=getTopicProgress(topicId);
  tp.quizAnswers={};
  // сбрасываем медаль если тест был последним шагом
  tp.medal=false;
  saveTopicProgress(topicId,tp);
  updateHUD();
  switchTab('quiz');
}

function renderQuiz(container){
  const t=currentTopic;
  const tp=getTopicProgress(t.id);
  const correct=countQuizCorrect(t.id);
  const allAnswered=Object.keys(tp.quizAnswers).length===t.quiz.length;

  const scoreDiv=document.createElement('div');
  scoreDiv.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px';
  scoreDiv.id='quizScore';
  const retakeBtn=allAnswered?`<button class="btn btn-retake" onclick="resetQuiz('${t.id}')">🔄 Пройти заново</button>`:'';
  scoreDiv.innerHTML=`<span style="font-weight:700;font-size:15px">Результат теста</span><div style="display:flex;align-items:center;gap:12px"><span style="font-size:18px;font-weight:800;color:${correct===t.quiz.length?'#4ade80':'#a78bfa'}">${correct}/${t.quiz.length} правильно</span>${retakeBtn}</div>`;
  container.appendChild(scoreDiv);

  t.quiz.forEach((q,qi)=>{
    const answered=tp.quizAnswers[qi]!==undefined;
    const userAns=tp.quizAnswers[qi];
    const div=document.createElement('div');
    div.id='quiz-item-'+qi;
    div.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px';
    div.innerHTML=`<div style="font-weight:600;font-size:15px;margin-bottom:${q.code?'10px':'14px'};line-height:1.5">${qi+1}. ${escHtml(q.q)}</div>${q.code?`<div class="code-block" style="margin-bottom:14px;font-size:13px"><pre>${escHtml(q.code)}</pre></div>`:''}`;
    q.opts.forEach((opt,oi)=>{
      const btn=document.createElement('button');
      btn.className='quiz-option';
      btn.textContent=opt;
      if(answered){
        btn.disabled=true;
        if(oi===q.ans)btn.classList.add('correct');
        else if(oi===userAns)btn.classList.add('wrong');
      }
      btn.onclick=()=>handleQuizAnswer(qi,oi,btn,div);
      div.appendChild(btn);
    });
    if(answered && q.explain){
      const ex=document.createElement('div');
      ex.className='quiz-explain'+(userAns===q.ans?' correct-ex':'');
      ex.textContent=(userAns===q.ans?'✓ ':'💡 ')+q.explain;
      div.appendChild(ex);
    }
    container.appendChild(div);
  });
}

function handleQuizAnswer(qi,oi,btn,container){
  const t=currentTopic;
  const tp=getTopicProgress(t.id);
  if(tp.quizAnswers[qi]!==undefined)return;
  tp.quizAnswers[qi]=oi;
  const isCorrect=oi===t.quiz[qi].ans;
  container.querySelectorAll('.quiz-option').forEach((b,bi)=>{
    b.disabled=true;
    if(bi===t.quiz[qi].ans)b.classList.add('correct');
    else if(bi===oi&&!isCorrect)b.classList.add('wrong');
  });
  if(!isCorrect)btn.classList.add('shake');
  // Показываем объяснение
  const q=t.quiz[qi];
  if(q.explain){
    const ex=document.createElement('div');
    ex.className='quiz-explain'+(isCorrect?' correct-ex':'');
    ex.textContent=(isCorrect?'✓ ':'💡 ')+q.explain;
    container.appendChild(ex);
  }
  saveTopicProgress(t.id,tp);
  if(isCorrect) addXP(5,btn);
  // Обновляем панель счёта
  const scoreEl=document.getElementById('quizScore');
  if(scoreEl){
    const c=countQuizCorrect(t.id);
    const allDone=Object.keys(tp.quizAnswers).length===t.quiz.length;
    const retakeBtn=allDone?`<button class="btn btn-retake" onclick="resetQuiz('${t.id}')">🔄 Пройти заново</button>`:'';
    scoreEl.querySelector('div').innerHTML=`<span style="font-size:18px;font-weight:800;color:${c===t.quiz.length?'#4ade80':'#a78bfa'}">${c}/${t.quiz.length} правильно</span>${retakeBtn}`;
  }
  checkTopicComplete();
}

// ============================
// TASKS
// ============================
function renderTasks(container){
  const t=currentTopic;
  const tp=getTopicProgress(t.id);
  t.tasks.forEach((task,ti)=>{
    const passed=!!tp.tasksPassed[ti];
    const div=document.createElement('div');
    div.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;'+(passed?'border-color:rgba(34,197,94,.3)':'');
    div.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700;color:hsl(${t.hue},70%,60%)">Задача ${ti+1}</span>
        <span style="font-weight:700;font-size:16px">${escHtml(task.title)}</span>
        ${passed?'<span class="task-passed-badge">✓ Решено</span>':''}
      </div>
      <p style="color:#475569;font-size:14px;line-height:1.6;margin-bottom:12px">${task.desc}</p>
      <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
        ${task.inputs.length>0?`<div style="flex:1;min-width:140px;background:#f0f6ff;border:1px solid #c7d7f5;border-radius:8px;padding:8px 12px;font-size:13px;"><span style="color:#6b748f;font-weight:600;display:block;margin-bottom:4px;">Входные данные</span><code style="color:#4f46e5;font-family:'Fira Code',monospace;">${escHtml(task.inputs.join('\\n'))}</code></div>`:''}
        <div style="flex:2;min-width:180px;background:#f0fff4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;font-size:13px;"><span style="color:#6b748f;font-weight:600;display:block;margin-bottom:4px;">Ожидаемый вывод</span><pre style="margin:0;color:#15803d;font-family:'Fira Code',monospace;font-size:12px;white-space:pre-wrap;">${escHtml(task.expected)}</pre></div>
      </div>
      <div id="editor-wrap-${ti}"></div>
      <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-run" id="runBtn-${ti}" onclick="runTask(${ti})">▶ Запустить</button>
        <button class="btn btn-check" id="checkBtn-${ti}" onclick="checkTask(${ti})">✓ Проверить</button>
      </div>
      <div class="output-area" id="output-${ti}" style="display:none"></div>
      <div id="result-${ti}"></div>`;
    container.appendChild(div);
    // Init CodeMirror
    requestAnimationFrame(()=>{
      const wrap=document.getElementById('editor-wrap-'+ti);
      if(!wrap)return;
      const savedCode=loadTaskCode(t.id,ti,task.starter);
      const cm=CodeMirror(wrap,{
        value:savedCode,
        mode:'python',
        theme:'default',
        lineNumbers:true,
        indentUnit:4,
        tabSize:4,
        indentWithTabs:false,
        extraKeys:{"Tab":cm=>cm.execCommand("indentMore")}
      });
      editors[ti]=cm;
    });
  });
}

async function runTask(ti){
  const task=currentTopic.tasks[ti];
  const btn=document.getElementById('runBtn-'+ti);
  const outEl=document.getElementById('output-'+ti);
  if(!_pyodideReady){outEl.style.display='block';outEl.className='output-area';outEl.textContent='⏳ Подождите, Python загружается...';return;}
  const code=editors[ti]?editors[ti].getValue():task.starter;
  if(editors[ti])saveTaskCode(currentTopic.id,ti,code);
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Запуск...';
  const res=await runStudentCode(code,task.inputs);
  btn.disabled=false;btn.innerHTML='▶ Запустить';
  outEl.style.display='block';
  if(res.ok){
    outEl.className='output-area';
    outEl.textContent=res.output||'(нет вывода)';
  }else{
    outEl.className='output-area error';
    outEl.textContent='⚠ '+res.error;
  }
}

async function checkTask(ti){
  const task=currentTopic.tasks[ti];
  const t=currentTopic;
  const btn=document.getElementById('checkBtn-'+ti);
  const outEl=document.getElementById('output-'+ti);
  const resEl=document.getElementById('result-'+ti);
  if(!_pyodideReady){outEl.style.display='block';outEl.className='output-area';outEl.textContent='⏳ Подождите, Python загружается...';return;}
  const code=editors[ti]?editors[ti].getValue():task.starter;
  if(editors[ti])saveTaskCode(t.id,ti,code);
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Проверка...';
  const res=await runStudentCode(code,task.inputs);
  btn.disabled=false;btn.innerHTML='✓ Проверить';
  outEl.style.display='block';
  if(res.ok){
    outEl.className='output-area';
    outEl.textContent=res.output||'(нет вывода)';
    const ok=res.output===task.expected;
    if(ok){
      resEl.innerHTML=`<div class="task-result-ok">✅ Верно! +15 XP</div>`;
      const tp=getTopicProgress(t.id);
      if(!tp.tasksPassed[ti]){
        tp.tasksPassed[ti]=true;
        saveTopicProgress(t.id,tp);
        addXP(15,btn);
        // Update border
        btn.closest('[style*="border:"]').style.borderColor='rgba(34,197,94,.3)';
        // Update badge
        const titleRow=btn.closest('div').parentElement.querySelector('[style*="align-items:center"]');
        if(titleRow&&!titleRow.querySelector('.task-passed-badge')){
          const badge=document.createElement('span');
          badge.className='task-passed-badge';
          badge.textContent='✓ Решено';
          titleRow.appendChild(badge);
        }
        checkTopicComplete();
      }
    }else{
      resEl.innerHTML=`<div class="task-result-err">❌ Неверно. Ожидалось:<br><code style="font-family:'Fira Code',monospace;color:#f1fa8c">${escHtml(task.expected)}</code></div>`;
    }
  }else{
    outEl.className='output-area error';
    outEl.textContent='⚠ '+res.error;
    resEl.innerHTML=`<div class="task-result-err">❌ Ошибка в коде. Исправьте и попробуйте снова!</div>`;
  }
}

// ============================
// MEDAL
// ============================
function checkTopicComplete(){
  const t=currentTopic;
  if(!t)return;
  const tp=getTopicProgress(t.id);
  if(tp.medal)return;
  const isPractice=t.type==='practice';
  const qOk=isPractice?true:countQuizCorrect(t.id)===t.quiz.length;
  const tOk=countTasksPassed(t.id)===t.tasks.length;
  if(qOk&&tOk){
    tp.medal=true;
    saveTopicProgress(t.id,tp);
    const p=getProgress();
    p.xp+=25;
    saveProgress(p);
    updateHUD();
    showMedal(25);
  }
}
function showMedal(bonus){
  document.getElementById('medalXP').textContent=`🎉 +${bonus} бонусных XP!`;
  document.getElementById('medalOverlay').style.display='flex';
}
function closeMedal(){
  document.getElementById('medalOverlay').style.display='none';
  updateHUD();
  renderTopicHeader();
}

// ============================
// UTILS
// ============================
function escHtml(s){
  if(!s)return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============================
// INIT
// ============================
async function init(){
  // Load Pyodide
  try{
    await getPy();
    _pyodideReady=true;
    const st=document.getElementById('pyStatus');
    const sp=document.getElementById('pySpinner');
    const tx=document.getElementById('pyStatusText');
    sp.style.display='none';
    tx.textContent='🐍 Python готов';
    st.style.background='rgba(34,197,94,.1)';
    st.style.borderColor='rgba(34,197,94,.3)';
    st.style.color='#4ade80';
    setTimeout(()=>{st.style.opacity='0';setTimeout(()=>{st.style.display='none';},500);},2000);
  }catch(e){
    const tx=document.getElementById('pyStatusText');
    tx.textContent='⚠ Ошибка загрузки Python';
    console.error(e);
  }
}

document.addEventListener('DOMContentLoaded',init);
</script>
